name: Update ACGXmh Cos Search Index

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly on Sunday at 4:00 UTC
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Maximum pages to crawl (0 = all)'
        required: false
        default: '0'
      delay:
        description: 'Delay between requests in seconds'
        required: false
        default: '1.0'

permissions:
  contents: write

jobs:
  update-index:
    name: Crawl and update search index
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Run crawler
        run: |
          python src/zh/acgxmhcos/assets/crawl_index.py \
            --output src/zh/acgxmhcos/assets/index.json \
            --max-pages ${{ github.event.inputs.max_pages || '0' }} \
            --delay ${{ github.event.inputs.delay || '1.0' }}

      - name: Commit and push index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/zh/acgxmhcos/assets/index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ACGXmh Cos search index"
            git push
          fi
