name: Build ACGXmh Cos APK

on:
  push:
    branches:
      - main
    paths:
      - 'src/zh/acgxmhcos/**'
      - 'core/**'
      - 'common.gradle'
      - 'gradle.properties'
      - '.github/workflows/build_acgxmhcos.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Update ACGXmh Cos Search Index"]
    types:
      - completed

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ACGXmh Cos extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build APK
        run: |
          ./gradlew :src:zh:acgxmhcos:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: acgxmhcos-apk
          path: src/zh/acgxmhcos/build/outputs/apk/debug/*.apk
          retention-days: 90
